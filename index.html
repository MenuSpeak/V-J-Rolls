<html lang="en">   
<head>

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --bg: #0b0b0d;
            --surface: #0f1114;
            --muted: #9aa0a6;
            --gold1: #d4af37;
            --gold2: #ffcc66;
            --accent: linear-gradient(90deg, var(--gold1), var(--gold2));
            --glass: rgba(255, 255, 255, 0.03);
            --card-radius: 16px;
            --shadow: 0 10px 30px rgba(2, 6, 23, 0.6);
            --maxw: 1200px;
            --gap: 20px;
            --ff-heading: 'Playfair Display', serif;
            --ff-ui: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial;
            --orange: #ff9800;
            --green: #4CAF50;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            position: relative;
            margin: 0;
            padding: 16px;
            min-height: 100vh;
            background: radial-gradient(1200px 600px at 10% 10%, rgba(212, 175, 55, 0.06), transparent 6%),
                        radial-gradient(1000px 500px at 95% 90%, rgba(255, 204, 102, 0.04), transparent 8%),
                        var(--bg);
            color: #e8e6e3;
            font-family: var(--ff-ui);
            display: flex;
            justify-content: center;
        }

        body::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('bg.png') no-repeat center center/cover;
            filter: grayscale(100%);
            opacity: 0.5;
            z-index: -1;
        }

        .container {
            width: 100%;
            max-width: var(--maxw);
            display: flex;
            flex-direction: column;
            gap: var(--gap);
        }

        /* Cafe Header */
        .cafe-header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px 0;
        }

        .cafe-name {
            font-family: 'Playfair Display', serif;
            font-size: 3.5rem;
            font-weight: 800;
            color: var(--gold1);
            text-shadow: 2px 2px 0px rgba(0, 0, 0, 0.1);
            line-height: 1;
            margin-bottom: 5px;
            display: inline-block;
        }

        .cafe-name::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 2px;
            background: var(--gold1);
        }

        .cafe-subtitle {
            font-size: 1.2rem;
            color: var(--orange);
            letter-spacing: 3px;
            text-transform: uppercase;
            font-weight: 700;
            margin-top: 10px;
        }

        .mobile-numbers {
            color: #ffffff;
            font-weight: 700;
            font-size: 1.05rem;
            margin-bottom: 15px;
        }

        .veg-nonveg {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 20px;
        }

        .veg, .nonveg {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 500;
            padding: 8px 16px;
            border-radius: 30px;
        }

        .veg { color: #2e7d32; background: rgba(46, 125, 50, 0.1); }
        .nonveg { color: #c62828; background: rgba(198, 40, 40, 0.1); }
        .veg .symbol { width: 16px; height: 16px; border-radius: 50%; background: #4caf50; border: 2px solid #2e7d32; display: inline-block; }
        .nonveg .symbol { width: 16px; height: 16px; border-radius: 50%; background: #f44336; border: 2px solid #c62828; display: inline-block; }

        /* Tabs */
        .tabs-scroll {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            padding: 8px 0;
            justify-content: center;
        }

        .tab {
            padding: 10px 16px;
            border-radius: 999px;
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.03);
            font-size: 14px;
            color: var(--muted);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .tab.active {
            background: linear-gradient(90deg, var(--gold1), var(--gold2));
            color: #0b0b0d;
            border: none;
        }

        /* Menu Grid */
        .menu-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 16px;
            margin-bottom: 20px;
        }

        @media (min-width: 768px) {
            .menu-grid { grid-template-columns: repeat(2, 1fr); }
        }
        @media (min-width: 1024px) {
            .menu-grid { grid-template-columns: repeat(3, 1fr); }
        }

        .card {
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.015), rgba(255, 255, 255, 0.01));
            border-radius: 12px;
            padding: 16px;
            border: 1px solid rgba(255, 255, 255, 0.03);
            box-shadow: 0 8px 24px rgba(2, 6, 23, 0.6);
            transition: transform 0.28s;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .card-header {
            display: flex;
            gap: 12px;
        }

        .thumb {
            width: 180px;
            height: 180px;
            border-radius: 10px;
            overflow: hidden;
            flex-shrink: 0;
        }

        .thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .dish {
            font-size: 16px;
            font-weight: 600;
            font-family: var(--ff-heading);
        }

        .desc {
            color: var(--muted);
            font-size: 13px;
            margin-top: 4px;
        }

        .price {
            font-weight: 700;
            font-size: 16px;
            color: var(--gold2);
        }

        .tags {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            margin-top: 8px;
        }

        .pill {
            padding: 4px 8px;
            border-radius: 999px;
            border: 1px solid rgba(255, 255, 255, 0.03);
            font-size: 11px;
            color: var(--muted);
        }

        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 12px;
        }

        .btn-primary {
            background: linear-gradient(90deg, var(--gold1), var(--gold2));
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            color: #0b0b0d;
            font-weight: 700;
            cursor: pointer;
            min-width: 100px;
            transition: all 0.3s;
        }

        .btn-primary.added {
            background: linear-gradient(90deg, #10b981, #059669);
        }

        /* Cart Styles */
        .cart-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 100;
        }

        .cart-button {
            background: linear-gradient(90deg, var(--gold1), var(--gold2));
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            position: relative;
            border: none;
        }

        .cart-count {
            position: absolute;
            top: -5px;
            right: -5px;
            background: #e74c3c;
            color: white;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: bold;
        }

        .cart-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(11, 11, 13, 0.95);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            padding: 16px;
        }

        .cart-modal.open {
            opacity: 1;
            visibility: visible;
        }

        .cart-content {
            background: var(--surface);
            width: 100%;
            max-width: 500px;
            border-radius: 16px;
            padding: 20px;
            max-height: 80vh;
            overflow-y: auto;
        }

        .cart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            padding-bottom: 12px;
        }

        .cart-title {
            font-family: var(--ff-heading);
            font-size: 22px;
            color: var(--gold2);
        }

        .close-cart {
            background: transparent;
            border: none;
            color: var(--muted);
            font-size: 24px;
            cursor: pointer;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
        }

        .item-name {
            font-weight: 600;
            font-size: 15px;
        }

        .item-price {
            color: var(--gold2);
            font-size: 14px;
        }

        .item-quantity {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .quantity-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.03);
            color: var(--muted);
            width: 28px;
            height: 28px;
            border-radius: 50%;
            cursor: pointer;
        }

        .remove-item {
            background: transparent;
            border: none;
            color: #e74c3c;
            cursor: pointer;
            font-size: 18px;
            margin-left: 12px;
        }

        .cart-empty {
            text-align: center;
            color: var(--muted);
            padding: 20px 0;
        }

        .cart-total {
            display: flex;
            justify-content: space-between;
            padding: 16px 0;
            border-top: 1px solid rgba(255, 255, 255, 0.03);
            font-weight: 600;
            font-size: 18px;
        }

        .total-amount {
            color: var(--gold2);
        }

        .cart-actions {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 16px;
        }

        .btn-whatsapp {
            background: #25D366;
            border: none;
            padding: 14px 18px;
            border-radius: 12px;
            color: white;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-clear {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.04);
            padding: 12px 14px;
            border-radius: 12px;
            color: var(--muted);
            cursor: pointer;
        }

        /* Delivery Form */
        .delivery-section {
            margin: 20px 0;
            padding: 20px;
            background: rgba(255, 255, 255, 0.015);
            border-radius: 10px;
        }

        .delivery-title {
            font-family: var(--ff-heading);
            font-size: 18px;
            margin-bottom: 15px;
            color: var(--gold2);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--muted);
            font-size: 14px;
        }

        .form-input {
            width: 100%;
            padding: 12px 16px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            color: white;
            font-size: 16px;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--gold2);
        }

        .customer-summary {
            background: rgba(255, 255, 255, 0.02);
            border-radius: 8px;
            padding: 15px;
            margin: 15px 0;
            display: none;
        }

        .customer-summary.active {
            display: block;
        }

        .summary-title {
            font-weight: 600;
            color: var(--gold2);
            margin-bottom: 10px;
        }

        .location-link-section {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
        }

        .map-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 24px;
            background: linear-gradient(90deg, var(--gold1), var(--gold2));
            color: #0b0b0d;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 700;
        }

        @media (max-width: 767px) {
            .cafe-name { font-size: 2.5rem; }
            .tab { padding: 6px 12px; font-size: 12px; }
        }
    </style>
</head>

        let cart = [];

        function extractPrice(priceStr) {
            let match = priceStr.match(/\d+/);
            return match ? parseInt(match[0]) : 0;
        }

        function updateCustomerSummary() {
            let name = document.getElementById('customerName').value.trim();
            let mobile = document.getElementById('customerMobile').value.trim();
            let address = document.getElementById('customerAddress').value.trim();
            let summaryDiv = document.getElementById('customerSummary');
            
            if(name || mobile || address) {
                summaryDiv.innerHTML = `<div class="summary-title">📦 Delivery Order</div>
                    <div>${name ? '<strong>Name:</strong> '+name+'<br>' : ''}
                    ${mobile ? '<strong>Mobile:</strong> '+mobile+'<br>' : ''}
                    ${address ? '<strong>Address:</strong> '+address : ''}</div>`;
                summaryDiv.classList.add('active');
            } else {
                summaryDiv.classList.remove('active');
            }
        }

        function updateCart() {
            let totalItems = cart.reduce((s,i)=>s+i.qty,0);
            document.getElementById('cartCount').innerText = totalItems;
            
            if(cart.length === 0) {
                document.getElementById('cartItems').innerHTML = '<div class="cart-empty">Your cart is empty</div>';
                document.getElementById('cartTotal').innerText = '₹0';
                return;
            }
            
            let itemsHtml = '';
            let totalAmount = 0;
            cart.forEach(item => {
                let priceVal = extractPrice(item.price);
                let itemTotal = priceVal * item.qty;
                totalAmount += itemTotal;
                itemsHtml += `<div class="cart-item">
                    <div><div class="item-name">${item.name}</div><div class="item-price">${item.price}</div></div>
                    <div class="item-quantity">
                        <button class="quantity-btn" onclick="updateQty(${item.id}, -1)">-</button>
                        <span style="min-width:25px; text-align:center">${item.qty}</span>
                        <button class="quantity-btn" onclick="updateQty(${item.id}, 1)">+</button>
                        <button class="remove-item" onclick="removeItem(${item.id})">×</button>
                    </div>
                </div>`;
            });
            document.getElementById('cartItems').innerHTML = itemsHtml;
            document.getElementById('cartTotal').innerText = `₹${totalAmount}`;
        }

        function addToCart(item, btn) {
            let existing = cart.find(i => i.id === item.id);
            if(existing) existing.qty++;
            else cart.push({id:item.id, name:item.name, price:item.price, qty:1});
            updateCart();
            btn.classList.add('added');
            btn.innerText = '✓ Added';
            setTimeout(() => { btn.classList.remove('added'); btn.innerText = 'Add to Cart'; }, 1000);
        }

        function updateQty(id, change) {
            let item = cart.find(i => i.id === id);
            if(item) {
                item.qty += change;
                if(item.qty <= 0) cart = cart.filter(i => i.id !== id);
                updateCart();
            }
        }

        function removeItem(id) {
            cart = cart.filter(i => i.id !== id);
            updateCart();
        }

        function renderMenu(items) {
            let grid = document.getElementById('menuGrid');
            if(items.length === 0) {
                grid.innerHTML = '<p style="text-align:center;color:var(--muted);padding:40px">No items found</p>';
                return;
            }
            grid.innerHTML = items.map(item => `
                <div class="card">
                    <div class="card-header">
                        <div class="thumb"><img src="${item.img}" alt="${item.name}" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 width=%27180%27 height=%27180%27%3E%3Crect width=%27180%27 height=%27180%27 fill=%27%23222%27/%3E%3Ctext x=%2750%25%27 y=%2750%25%27 text-anchor=%27middle%27 fill=%27%23999%27%3E🍽️%3C/text%3E%3C/svg%3E'"></div>
                        <div class="card-info">
                            <div class="dish">${item.name}</div>
                            <div class="desc">${item.desc}</div>
                            <div class="tags">${item.tags.map(t=>`<span class="pill">${t}</span>`).join('')}</div>
                        </div>
                    </div>
                    <div class="card-footer">
                        <div class="price">${item.price}</div>
                        <button class="btn-primary" onclick='addToCart(${JSON.stringify(item).replace(/'/g, "\\'")}, this)'>Add to Cart</button>
                    </div>
                </div>
            `).join('');
        }

        function filterByCategory(cat) {
            if(cat === 'all') renderMenu(menuData);
            else renderMenu(menuData.filter(i => i.cat === cat));
        }

        // Event Listeners
        document.getElementById('cartButton').onclick = () => document.getElementById('cartModal').classList.add('open');
        document.getElementById('closeCart').onclick = () => document.getElementById('cartModal').classList.remove('open');
        document.getElementById('clearCart').onclick = () => { cart = []; updateCart(); };
        
        document.getElementById('whatsappOrder').onclick = () => {
            if(cart.length === 0) { alert('Cart is empty!'); return; }
            let name = document.getElementById('customerName').value.trim();
            let mobile = document.getElementById('customerMobile').value.trim();
            let address = document.getElementById('customerAddress').value.trim();
            if(!name || !mobile || !address) { alert('Please fill all delivery details'); return; }
            
            let msg = `Hello! I want to place an order:\n\n🏠 Home Delivery\nName: ${name}\nMobile: ${mobile}\nAddress: ${address}\n\n📋 Order:\n`;
            cart.forEach(i => msg += `• ${i.name} - ${i.qty} x ${i.price}\n`);
            let total = cart.reduce((s,i)=> s + (extractPrice(i.price)*i.qty),0);
            msg += `\n💰 Total: ₹${total}\n\nThank you!`;
            window.open(`https://wa.me/919272472323?text=${encodeURIComponent(msg)}`, '_blank');
        };
        
        document.getElementById('customerName').oninput = updateCustomerSummary;
        document.getElementById('customerMobile').oninput = updateCustomerSummary;
        document.getElementById('customerAddress').oninput = updateCustomerSummary;
        
        document.querySelectorAll('.tab').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                filterByCategory(btn.dataset.cat);
            };
        });
        
        renderMenu(menuData);
        
        window.addToCart = addToCart;
        window.updateQty = updateQty;
        window.removeItem = removeItem;
    </script>
